# Kitty config mirroring the Ghostty setup (.config/ghostty/config).
# Each block notes the Ghostty option it replicates.

# font-family = BlexMono Nerd Font / font-size = 15.
# Kitty only matches fonts CoreText flags as monospace, and the standard Nerd
# Font variant isn't (double-width symbols) — kitty would silently fall back
# to Menlo. The "Mono" variant is the same face with single-width symbols.
font_family      family="BlexMono Nerd Font Mono"
# SemiBold as bold on purpose — real Bold is too heavy for this face. Matches
# the Ghostty setup, where the family's Bold was replaced with SemiBold.
bold_font        postscript_name=BlexMonoNFM-SemiBold
italic_font      auto
bold_italic_font postscript_name=BlexMonoNFM-SemiBoldItalic
font_size        15.0

# Kitty's default "platform" compositing renders thinner/lighter text on
# macOS than Ghostty's CoreText smoothing; "legacy" restores the thicker,
# higher-contrast look. Fine-tune with "<gamma> <contrast>" (e.g. 1.7 30)
# if it still doesn't match.
text_composition_strategy legacy

# Devanagari (Sanskrit): Plex Mono has no Devanagari glyphs; route the block
# to the design-matched IBM Plex Sans Devanagari (Brewfile cask). symbol_map
# fonts are exempt from kitty's monospace requirement.
symbol_map U+0900-U+097F IBM Plex Sans Devanagari

# theme = catppuccin-frappe (vendored from github.com/catppuccin/kitty)
include themes/catppuccin-frappe.conf

# window-width = 200 / window-height = 48 (cells).
# Kitty ignores initial_window_* while remember_window_size is on.
remember_window_size  no
initial_window_width  200c
initial_window_height 48c

# Ghostty defaults to 2px window padding; kitty defaults to 0.
window_padding_width 2

# Ghostty uses native macOS tabs (top); kitty defaults to a bottom tab bar.
tab_bar_edge top

# macos-option-as-alt = true
macos_option_as_alt yes

# bell-features = no-audio
enable_audio_bell no

# command = /opt/homebrew/bin/bash --login
shell /opt/homebrew/bin/bash --login

# Ghostty pins term=xterm-256color, but kitty's own terminfo (xterm-kitty)
# unlocks more features locally, so it stays at the default. If a remote host
# lacks the kitty terminfo, connect with `kitten ssh` instead of overriding.

# tab/window/split-inherit-working-directory = true.
# Kitty has no global inherit switch: rebind the default shortcuts to their
# cwd-inheriting variants. Splits mirror Ghostty's macOS bindings
# (cmd+d right, cmd+shift+d down, cmd+alt+arrows to navigate, zoom toggle).
enabled_layouts splits,stack
map cmd+t       new_tab_with_cwd
map cmd+n       new_os_window_with_cwd
map cmd+d       launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current
map cmd+alt+left  neighboring_window left
map cmd+alt+right neighboring_window right
map cmd+alt+up    neighboring_window up
map cmd+alt+down  neighboring_window down
map cmd+shift+enter toggle_layout stack
